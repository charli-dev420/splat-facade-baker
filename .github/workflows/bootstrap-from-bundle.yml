name: Bootstrap repository from uploaded git bundle

on:
  push:
    paths:
      - 'bootstrap/*.bundle'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  bootstrap:
    name: Replace repository contents from bundle
    runs-on: ubuntu-latest
    steps:
      - name: Checkout bootstrap commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Locate uploaded bundle
        id: bundle
        shell: bash
        run: |
          set -euo pipefail
          BUNDLE="$(find bootstrap -maxdepth 1 -type f -name '*.bundle' | sort | tail -n 1 || true)"
          if [ -z "$BUNDLE" ]; then
            echo "No .bundle file found in bootstrap/. Upload splat-facade-baker-private-ready-v2.9.bundle there." >&2
            exit 1
          fi
          echo "path=$BUNDLE" >> "$GITHUB_OUTPUT"
          echo "Using bundle: $BUNDLE"

      - name: Clone bundle and force-push real repo
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          BUNDLE_PATH="$GITHUB_WORKSPACE/${{ steps.bundle.outputs.path }}"
          rm -rf /tmp/sfb_bundle_repo
          git clone "$BUNDLE_PATH" /tmp/sfb_bundle_repo
          cd /tmp/sfb_bundle_repo
          git remote remove origin || true
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git branch -M main
          git push --force origin main --tags
